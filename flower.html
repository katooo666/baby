<!DOCTYPE html>
<style>
    /* BACKGROUND MUSIC - INVISIBLE & TRANSPARENT */
    .bg-music {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
    }
    
    .bg-music audio::-webkit-media-controls-timeline,
    .bg-music audio::-webkit-media-controls-timeline-container {
      display: none !important;
    }
    
    .bg-music audio::-webkit-media-controls-volume-control-container,
    .bg-music audio::-webkit-media-controls-current-time-display,
    .bg-music audio::-webkit-media-controls-time-remaining-display,
    .bg-music audio::-webkit-media-controls-fullscreen-button {
      display: none !important;
    }
    
    .bg-music audio::-webkit-media-controls-panel {
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 5px;
    }
  </style> 
  <!-- 🎵 BACKGROUND MUSIC - INVISIBLE + AUTOPLAY -->
  <div class="bg-music">
    <audio id="bgMusic" loop autoplay preload="auto" volume="0.3">
      <source src="MyEverything.mp3" type="audio/mpeg">
      <!-- PALITAN MO YUNG SRC MO DITO -->
    </audio>
  </div>
  <script>
    // FORCE AUTOPLAY FOR BACKGROUND MUSIC
    window.addEventListener('load', function() {
      const bgMusic = document.getElementById('bgMusic');
      
      // Auto start
      bgMusic.play().catch(() => {
        // Silent retry
        setTimeout(() => bgMusic.play(), 100);
      });
      
      // Restart if paused (mobile/tab switch)
      document.addEventListener('click', () => {
        if (bgMusic.paused) {
          bgMusic.play();
        }
      }, { once: true });
      
      // Keep playing on visibility change
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && bgMusic.paused) {
          bgMusic.play();
        }
      });
    });
  </script>
